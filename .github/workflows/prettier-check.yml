name: Prettier check

on:
  pull_request:
    paths:
      - 'src/**'
      - 'site/**'
      - '.prettierrc'
      - 'package.json'

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run Prettier check
        run: npm run format:check
