name: Playwright tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests (vitest)
        run: npm run test:unit

  test:
    name: Playwright tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Build site bundle
        run: npm run build:site

      - name: Diagnose Playwright installation
        run: |
          echo "--- resolve @playwright/test version and path ---"
          node -e "const p=require('@playwright/test/package.json'); console.log('version:',p.version); console.log('path:', require.resolve('@playwright/test'))"
          echo "--- npm ls tree for @playwright/test ---"
          npm ls @playwright/test --all || true

      - name: Install Playwright browsers and dependencies (explicit repo-installed CLI)
        run: ./node_modules/.bin/playwright install chromium --with-deps

      - name: Run Playwright tests (explicit repo-installed CLI)
        run: ./node_modules/.bin/playwright test --reporter=list
