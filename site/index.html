<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Drills — Running & Training</title>
    <!-- Favicons: PNG fallbacks + SVG -->
    <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="favicon-16x16.png" type="image/png" sizes="16x16" />
    <link rel="icon" href="logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
    <meta name="theme-color" content="#0b74de" />
    <style>
      :root {
        --gap: 12px;
        --bg: #f6f7f9;
        --text: #111;
        --card-bg: #fff;
        --muted: #666;
        --accent: #0b74de;
        --success: #0bda6e;
        --card-shadow: 0 1px 4px rgba(10, 10, 10, 0.06);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0f14;
          --text: #e6eef8;
          --card-bg: #0f1720;
          --muted: #9fb0c8;
          --accent: #1d9bf0;
          --success: #39d98a;
          --card-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
        }
      }
      /* manual overrides */
      [data-theme='dark'] {
        --bg: #0b0f14;
        --text: #e6eef8;
        --card-bg: #0f1720;
        --muted: #9fb0c8;
        --accent: #1d9bf0;
        --success: #39d98a;
        --card-shadow: 0 1px 6px rgba(0, 0, 0, 0.6);
      }
      [data-theme='light'] {
        --bg: #f6f7f9;
        --text: #111;
        --card-bg: #fff;
        --muted: #666;
        --accent: #0b74de;
        --success: #0bda6e;
        --card-shadow: 0 1px 4px rgba(10, 10, 10, 0.06);
      }
      body {
        font-family: Segoe UI, Arial, sans-serif;
        margin: 12px;
        background: var(--bg);
        color: var(--text);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .brand-container {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #site-logo {
        width: 88px;
        height: 88px;
        display: inline-block;
      }
      .brand {
        font-weight: 700;
        font-size: 18px;
      }
      .controls {
        display: flex;
        gap: 8px;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 8px 10px;
        border-radius: 6px;
      }
      .container {
        max-width: 1100px;
        margin: 12px auto;
      }
      /* responsive grid: 1-3 columns depending on width */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: var(--gap);
      }
      /* Card: make preview full-bleed to reduce visible surrounding background */
      .card {
        background: transparent;
        padding: 0;
        border-radius: 8px;
        box-shadow: none;
        display: flex;
        flex-direction: column;
        gap: 0;
        align-items: stretch;
      }
      .card > .meta {
        background: var(--card-bg);
        padding: 12px;
        border-radius: 0 0 8px 8px;
        box-shadow: var(--card-shadow);
        display: flex;
        flex-direction: column;
      }
      .card.done {
        opacity: 0.9;
        filter: grayscale(60%);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.02));
      }
      .card.done .thumb {
        filter: grayscale(60%);
        opacity: 0.85;
      }
      .card .done-badge {
        display: inline-block;
        background: var(--muted);
        color: #fff;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        margin-left: 8px;
      }
      .card .sets-display {
        font-size: 22px;
        font-weight: 800;
        margin-right: 8px;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .sets-label {
        font-size: 14px;
        color: var(--muted);
        font-weight: 700;
        margin-right: 6px;
      }
      .card .reps-display {
        font-size: 18px;
        font-style: italic;
        font-weight: 400;
        color: var(--text);
      }
      .reps-label {
        font-size: 14px;
        color: var(--muted);
        font-style: italic;
        margin-right: 4px;
      }
      .card .title {
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text);
        font-size: 20px;
      }
      .card-actions {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 8px 10px;
        border-radius: 6px;
      }
      .btn-mark {
        background: var(--success);
        color: #000;
        padding: 10px 14px;
        font-size: 16px;
        border-radius: 8px;
        font-weight: 700;
      }
      .info-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      @media (max-width: 480px) {
        .info-row {
          flex-direction: row;
          gap: 8px;
        }
        .card .sets-display {
          font-size: 20px;
        }
        .btn-mark {
          padding: 8px 10px;
          font-size: 14px;
        }
      }
      /* thumb is full-width preview; height adjusts by orientation */
      .thumb {
        width: 100%;
        background: transparent;
        border-radius: 0;
        overflow: hidden;
        display: block;
        position: relative;
      }
      .thumb img,
      .thumb video,
      .thumb picture img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .thumb.horizontal {
        height: 220px;
      }
      .thumb.vertical {
        height: 420px;
      }
      .meta {
        padding: 12px;
      }
      .title {
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text);
      }
      .details {
        color: var(--muted);
        font-size: 14px;
      }
      .group-title {
        margin-top: 18px;
        margin-bottom: 8px;
        font-size: 18px;
        color: var(--text);
      }
      .card-actions {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      a {
        color: var(--accent);
      }
      @media (max-width: 1024px) {
        .thumb.horizontal {
          height: 200px;
        }
        .thumb.vertical {
          height: 380px;
        }
      }
      @media (max-width: 720px) {
        .grid {
          grid-template-columns: repeat(1, 1fr);
        }
        header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
      /* modal */
      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
        z-index: 50;
      }
      .modal.open {
        display: flex;
      }
      .modal .box {
        background: #000;
        max-width: 95vw;
        border-radius: 6px;
        overflow: hidden;
        width: min(95vw, 1000px);
        height: min(90vh, 800px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal iframe,
      .modal video {
        display: block;
        width: 100%;
        height: auto;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="brand-container">
          <img id="site-logo" src="logo.svg" alt="Drills logo" />
          <div class="brand" id="brand">Basketball Off-Season Drills</div>
        </div>
        <div class="controls">
          <span class="lang-icon" aria-hidden="true">🌐</span>
          <select id="lang-select" aria-label="Language">
            <option value="en">English</option>
            <option value="fi">Suomi</option>
            <option value="sv">Svenska</option>
          </select>
          <button id="theme-btn" title="Theme: system">Theme</button>
          <button id="filter-btn">Show: All</button>
          <button id="clear-progress" title="Clear stored progress">Clear progress</button>
        </div>
      </header>

      <main id="content">
        <p>Loading drills…</p>
      </main>

      <div id="modal" class="modal" aria-hidden="true">
        <div class="box" id="modal-box"></div>
      </div>
    </div>

    <script
      src="./site.bundle.js"
      defer
      onerror="(function(){try{const c=document.getElementById('content'); if(c){c.textContent='site.bundle.js not found — the site JavaScript is missing. Run npm install && npm run build:site before serving/publishing.';} console.warn('site.bundle.js not found — run npm run build:site.');}catch(e){} })()"
    ></script>
  </body>
</html>
